# Fase 1 — Laboratorio con imágenes oficiales (Kafka KRaft + InfluxDB OSS 2 + Grafana)
# Uso: desde esta carpilla → docker compose up -d
#
# Kafka (KRaft, un nodo combinado broker+controller):
# https://github.com/apache/kafka/blob/trunk/docker/examples/docker-compose-files/single-node/plaintext/docker-compose.yml
# Guía de variables: https://github.com/apache/kafka/blob/trunk/docker/examples/README.md
#
# InfluxDB 2: https://hub.docker.com/_/influxdb
# Grafana: https://hub.docker.com/r/grafana/grafana
#
# Variables: copia `.env.example` → `.env` y edítalo.

services:
  kafka:
    image: docker.io/${IMAGE_KAFKA}
    hostname: kafka
    restart: unless-stopped
    ports:
      - "${KAFKA_PORT}:9092"
    environment:
      CLUSTER_ID: ${KAFKA_CLUSTER_ID}
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: CONTROLLER://:29093,PLAINTEXT_HOST://:9092,PLAINTEXT://:19092
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT_HOST://${KAFKA_ADVERTISED_EXTERNAL_HOST}:${KAFKA_PORT},PLAINTEXT://kafka:19092"
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  influxdb:
    image: docker.io/${IMAGE_INFLUXDB}
    restart: unless-stopped
    ports:
      - "${INFLUXDB_PORT}:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUX_USERNAME}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUX_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUX_ORG}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUX_BUCKET}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUX_ADMIN_TOKEN}
    volumes:
      - influxdb_data:/var/lib/influxdb2

  grafana:
    image: docker.io/${IMAGE_GRAFANA}
    restart: unless-stopped
    depends_on:
      - influxdb
    ports:
      - "${GRAFANA_PORT}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      INFLUX_ORG: ${INFLUX_ORG}
      INFLUX_BUCKET: ${INFLUX_BUCKET}
      INFLUX_ADMIN_TOKEN: ${INFLUX_ADMIN_TOKEN}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards

  spark:
    image: docker.io/${IMAGE_SPARK}
    profiles: ["spark"]
    # En local/dev usamos root para evitar problemas de permisos con cache Ivy.
    user: "0:0"
    depends_on:
      - kafka
    working_dir: /app
    volumes:
      - ../:/app
      - spark_ivy_cache:/tmp/.ivy2
    environment:
      # Dentro de Docker, Kafka se alcanza por nombre de servicio + listener interno.
      KAFKA_BOOTSTRAP_SERVERS: kafka:19092
      KAFKA_TOPIC_RAW_SHIP_DATA: raw-ship-data
      # Checkpoint dentro del volumen montado del repo.
      SPARK_CHECKPOINT_DIR: /app/tmp/spark-checkpoints/raw-ship-data
      # Salida de Spark: console | influx | both.
      SPARK_OUTPUT_MODE: ${SPARK_OUTPUT_MODE:-console}
      # Evitar que Spark intente usar /nonexistent como HOME/ivy cache.
      HOME: /tmp
      # Forzar rutas Ivy escribibles para --packages.
      SPARK_SUBMIT_OPTS: "-Divy.home=/tmp/.ivy2 -Divy.cache.dir=/tmp/.ivy2/cache"
      # InfluxDB sink.
      INFLUXDB_URL: http://influxdb:8086
      INFLUX_ORG: ${INFLUX_ORG}
      INFLUX_BUCKET: ${INFLUX_BUCKET}
      INFLUX_ADMIN_TOKEN: ${INFLUX_ADMIN_TOKEN}
      INFLUX_MEASUREMENT: ${INFLUX_MEASUREMENT:-ships_positions}
      INFLUX_BATCH_SIZE: ${INFLUX_BATCH_SIZE:-500}
      INFLUX_FLUSH_INTERVAL_MS: ${INFLUX_FLUSH_INTERVAL_MS:-1000}
      # Facilita imports tipo `from core...` en driver/workers.
      PYTHONPATH: /app/src/processing
    # Contenedor "toolbox": preparar cache Ivy y quedar vivo para exec.
    command:
      - /bin/sh
      - -lc
      - >
        mkdir -p /tmp/.ivy2/cache /tmp/.ivy2/jars /tmp/.ivy2/local &&
        python -c "import influxdb_client" >/dev/null 2>&1 || pip install influxdb-client &&
        sleep infinity

  web:
    image: docker.io/node:22-alpine
    profiles: ["web"]
    working_dir: /app/src/web/ui
    depends_on:
      - influxdb
      - grafana
    ports:
      - "3001:3000"
    environment:
      INFLUXDB_URL: http://influxdb:8086
      INFLUX_ORG: ${INFLUX_ORG}
      INFLUX_BUCKET: ${INFLUX_BUCKET}
      INFLUX_ADMIN_TOKEN: ${INFLUX_ADMIN_TOKEN}
      INFLUX_MEASUREMENT: ${INFLUX_MEASUREMENT:-ships_positions}
      WEB_SPEED_ALERT_KNOTS: ${WEB_SPEED_ALERT_KNOTS:-25}
      GRAFANA_URL: http://grafana:3000
      # Forzar file watching estable en Docker Desktop (Windows/macOS).
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ../:/app
      - web_node_modules:/app/src/web/ui/node_modules
    command:
      - /bin/sh
      - -lc
      - >
        npm install &&
        npm run dev -- -H 0.0.0.0 -p 3000

volumes:
  influxdb_data:
  grafana_data:
  spark_ivy_cache:
  web_node_modules:
